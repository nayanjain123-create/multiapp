<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary bg-dark" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><strong>Todo App</strong></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/chat_app/">Chat App</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/todo_app/">Todo App</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/olx_app/">OLX App</a>
            </li>
      </ul>
    </div>
  </div>
</nav>
    <div class="container text-center mt-4">
        <h1>Todo App</h1>
        <p>This is the Todo App page.</p>
        <a href="/task_add/" class="btn btn-primary">+ Add Task</a>
    </div>
    <div class="container">
    <table class="table table-striped mt-4">
        <thead class="text-center">
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody class="text-center">
            {% for tasks in task %}
            <tr>
                <td>{{ tasks.title }}</td>
                <td>{{ tasks.description }}</td>
                <td>
                    <a href="/task_edit/{{ tasks.id }}" class="btn btn-sm btn-primary">Edit</a>
                    <a href="/delete_task/{{ tasks.id }}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
