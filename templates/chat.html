<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chat Room</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f5f5f5;
        }

        .chat-container{
            max-width: 800px;
            margin: 40px auto;
        }

        .chat-box{
            height: 500px;
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #ddd;
        }

        .message{
            margin-bottom: 15px;
            display: flex;
        }

        .my-message{
            justify-content: end;
        }

        .other-message{
            justify-content: start;
        }

        .bubble{
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .my-bubble{
            background: #0d6efd;
            color: white;
        }

        .other-bubble{
            background: #e9ecef;
            color: black;
        }

    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary bg-dark" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><strong>Chat App</strong></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/chat_app/">Chat App</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/todo_app/">Todo App</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/olx_app/">OLX App</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container chat-container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white text-center">
            <h4>
                Chat with {{ other_user.username }}
            </h4>
        </div>

        <div class="card-body chat-box" id="chat-box">

            {% for msg in messages %}

                {% if msg.sender == request.user %}

                    <div class="message my-message">
                        <div class="bubble my-bubble">
                            {{ msg.text }}
                        </div>
                    </div>

                {% else %}

                    <div class="message other-message">
                        <div class="bubble other-bubble">
                            <strong>
                                {{ msg.sender.username }}
                            </strong>
                            <br>
                            {{ msg.text }}
                        </div>
                    </div>

                {% endif %}

            {% endfor %}

        </div>

        <div class="card-footer">

            <div class="input-group">

                <input
                    type="text"
                    id="message-input"
                    class="form-control"
                    placeholder="Type message..."
                >

                <button
                    class="btn btn-primary"
                    onclick="sendMessage()"
                >
                    Send
                </button>

            </div>

        </div>

    </div>

</div>

<script>

    const roomId = "{{ room_id }}";

    const socket = new WebSocket(
        "wss://" + window.location.host + "/ws/chat/" + roomId + "/"
    );

    socket.onmessage = function(e){

        const data = JSON.parse(e.data);

        const chatBox = document.getElementById("chat-box");

        let messageHtml = "";

        if(data.username === "{{ request.user.username }}"){

            messageHtml = `
                <div class="message my-message">
                    <div class="bubble my-bubble">
                        ${data.message}
                    </div>
                </div>
            `;

        }else{

            messageHtml = `
                <div class="message other-message">
                    <div class="bubble other-bubble">
                        <strong>${data.username}</strong><br>
                        ${data.message}
                    </div>
                </div>
            `;
        }

        chatBox.innerHTML += messageHtml;

        chatBox.scrollTop = chatBox.scrollHeight;
    };

    function sendMessage(){

        const input = document.getElementById("message-input");

        if(input.value.trim() === ""){
            return;
        }

        socket.send(JSON.stringify({

            "message": input.value,

            "receiver_id": "{{ other_user.id }}"
        }));

        input.value = "";
    }

</script>

</body>
</html>
